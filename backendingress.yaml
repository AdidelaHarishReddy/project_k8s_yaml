# k8s/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-backendapp-ingress
  namespace: project
spec:
  ingressClassName: nginx
  rules:
  - host: mybackapp.local
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: backend-clusterip
              port:
                number: 8000
